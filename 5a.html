<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 5a</title>
    <style>
        body{
            height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 0.36fr;
            grid-template-rows: 1fr 0.8fr 0.8fr;
            gap: 10px;
            grid-template-areas: 
                "box1 box3 box4 box4"
                "box2 box3 box5 box7"
                "box6 box6 box5 box7";
            overflow: hidden;
            position: fixed;
        }
        #box1{
            background-color: orange;
            grid-area: box1;
        }
        #box2{
            background-color: rgb(0, 221, 255)
        }
        #box3{
            background-color: rosybrown;
            grid-area: box3;
        }
        #box4{
            background-color: rgb(141, 175, 175);
            grid-area: box4;
        }
        #box5{
            background-color: greenyellow;
            grid-area: box5;
        }
        #box6{
            background-color: orange;
            grid-area: box6;
        }
        #box7{
            grid-area: box7;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            background-color: white;
            
        }
        #bola1{
            background-color: orange;
            border-radius: 50%;
            height: 100px;
            width: 100px;
        }
        #bola2{
            background-color: rosybrown;
            border-radius: 50%;
            height: 100px;
            width: 100px;
        }
        #bola3{
            background-color: greenyellow;
            border-radius: 50%;
            height: 100px;
            width: 100px;
        }
        #bola4{
            background-color: lightgray;
            border-radius: 50%;
            height: 100px;
            width: 100px;
        }

    </style>
</head>
<body>
    <div class="area" id="box1"></div>
    <div class="area" id="box2"></div>
    <div class="area" id="box3"></div>
    <div class="area" id="box4"></div>
    <div class="area" id="box5"></div>
    <div class="area" id="box6"></div>
    <div class="area" id="box7">
        <div id="bola1"></div>
        <div id="bola2"></div>
        <div id="bola3"></div>
        <div id="bola4"></div>
    </div>
    
</body>
</html>
