<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 3</title>

    <style>

        .container{
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-direction: column;
        }
        .França{
            display: grid;
            border: 1px solid black;
            width: 450px;
            height: 290px;
            flex-direction: row;
            grid-template-rows: 100 100 100;
            grid-template-areas: 
            "azul branco vermelho"
            "azul branco vermelho"
            "azul branco vermelho";              
        }

        #fai1{ grid-area: azul; background-color: blue;}
        #fai2{ grid-area: branco; background-color: white;}
        #fai3{ grid-area: vermelho; background-color: red; }

         .Alemanha{
            display: grid;
            border: 1px solid black;
            width: 450px;
            height: 290px;
            flex-direction: row;
            margin-top: 10px; 
            grid-template-rows: 100 100 100;
            grid-template-areas: 
            "preto preto preto"
            "vermelho vermelho vermelho"
            "amarelo amarelo amarelo";              
        }

        #afai1{ grid-area: preto; background-color: black;}
        #afai2{ grid-area: vermelho; background-color: red;}
        #afai3{ grid-area: amarelo; background-color: yellow; }


         .Japão {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid black;
            width: 450px;
            height: 290px;
            flex-direction: row;
            margin-top: 10px;
        }

        #bola {
            background-color: red;
            height: 170px; width: 170px; border-radius: 50%;
        }
        


    </style>

</head>
<body>  

    <div class="container">


        <div class="França">

            <div id="fai1"></div>
            <div id="fai2"></div>
            <div id="fai3"></div>

        </div>

        <div class="Alemanha">

            <div id="afai1"></div>
            <div id="afai2"></div>
            <div id="afai3"></div>

        </div>

        <div class="Japão">

            <div id="bola"></div>

        </div>
        </div>
    
</body>
</html>
